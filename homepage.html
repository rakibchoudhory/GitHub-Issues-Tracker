<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="./image/github-logo.png" type="image/x-icon">
    <!-- Daisi UI And Tailwind Css -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome Cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        .active{
            background-color: blue;
            color: white;
        }
    </style>
</head>

<body>
    
  

    <!-- Navbar -->
    <nav class=" flex flex-col gap-2 md:flex-row  sm:py-4 md:py-4 navbar bg-base-100 shadow-sm justify-between">
        <!-- left side -->
        <div class="">
            <div class="flex flex-col md:flex-row gap-1 text-xl items-center "> <img class="w-8" src="/image/github-logo.png"
                    alt=""> GitHub Issues Tracker</div>
        </div>
        <!-- Right side -->
        <div class="flex gap-2">
            <label class="input">

                <input id="search-input" type="search" required placeholder="Search" />
            </label>
            <div class="w-40">
                <button  id="btn-search" class="btn btn-primary cursor-pointer">+ New Issue</button>
            </div>
        </div>
    </nav>


    <!--Hero -->
    <!-- 3 buttons -->
    <div class="mt-10">
        <div class="w-11/12 mx-auto  py-5 px-5  shadow-[0_0_5px_rgba(0,0,0,0.1)] flex  gap-3 rounded-sm">
            <button id="all-btn" onclick="loadissues () , addActive(this)" class="btn px-10 category-btn active cursor-pointer">All</button>
            <button id="btn-open" onclick="loadOpenBtn() , addActive(this)" class="btn px-7 category-btn cursor-pointer">Open</button>
            <button id="btn-close" onclick="loadClosedBtn() , addActive(this)" class="btn px-6 category-btn cursor-pointer">Closed</button>
        </div>
    </div>

<!-- Loading -->
 <div id="loading" class="hidden flex justify-center">
   
<span class="loading loading-spinner loading-md"></span>
<span class="loading loading-spinner loading-lg"></span>
 <span class="loading loading-spinner loading-xl"></span>

 </div>
    <section>
        <div class="w-11/12 mx-auto  py-5 px-5  shadow-[0_0_5px_rgba(0,0,0,0.1)]  mt-4 flex justify-between rounded-sm h-full">
            <!-- left side -->
            <div class="flex items-center gap-3">
                <div class="p-2 bg-[#ECE4FF] rounded-full">
                    <img src="./image/Aperture.png" alt="">
                </div>
                <div>
                    <p class=" text-xl font-semibold"><span id="issues-count">50</span> Issues</p>
                    <p class="text-gray-400">Track and manage your project issues</p>
                </div>
            </div>
            <!-- Right side -->
            <div class="flex gap- items-center gap-4">
                <div>
                    <div class="flex items-center gap-2">
                        <img src="./image/circle-1.png" alt="">
                        <p>Open</p>
                    </div>
                </div>

                <div>
                    <div class="flex items-center gap-2">
                        <img src="./image/circle-2.png" alt="">
                        <p>Closed</p>
                    </div>
                </div>
            </div>

        </div>


        <!-- Card-Container -->
        <div id="card-container" class="sm:grid grid-cols-1 space-y-6 md:grid-cols-2 lg:grid-cols-4  w-11/12 mx-auto  shadow-sm pt-5 ">
            <!-- Card -->
           

        </div>
    </section>

<!-- Loading -->
 

    <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
<dialog id="my-modal" class="modal ">
  <div id="details-container" class="modal-box border-4 border-red-600">
    
  </div>
</dialog>

    <script src="./script/index.js"></script>
</body>

</html>
